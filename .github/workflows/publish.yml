name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Change this to 'master' if that is your default branch

permissions:
  contents: read    # Allows checking out the code
  packages: write   # Grant permissions to write/publish to the container registry

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Tag and Prepare Naming
        run: |
          # 1. Extract the base tag version (e.g., 2.25.5)
          BASE_TAG=$(grep -i '^FROM' Dockerfile | head -n 1 | sed 's/.*://' | tr -d '\r ')
          echo "Extracted version: $BASE_TAG"
          
          # 2. Lowercase the repository namespace to ensure safe Docker formatting
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # 3. Export both tags to the runner environment
          echo "IMAGE_TAG_VERSION=ghcr.io/${REPO_LOWER}:${BASE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_TAG_LATEST=ghcr.io/${REPO_LOWER}:latest" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Instructs Buildx to attach and publish both tags to the registry
          tags: |
            ${{ env.IMAGE_TAG_VERSION }}
            ${{ env.IMAGE_TAG_LATEST }}
